name: Node.js CI integration tests
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vscode/**'
  workflow_dispatch:

env:
  SOURCE_BUILDER_IMAGE: docker.io/paketobuildpacks/builder-jammy-base
  GHCR_BUILDER_IMAGE: ghcr.io/${{ github.repository }}/builder-jammy-base:latest

permissions:
  contents: read
  packages: read

jobs:
  integration-tests:
    strategy:
      fail-fast: false
      matrix:
        node_version: [24.x]
        combos:
          # - runner: "ubuntu-22.04"
          #   runtime: "podman5"
          #   root: "rootless"
          #   label: "U22-P5-RL"

          - runner: "ubuntu-24.04"
            runtime: "podman5"
            root: "rootless"
            label: "U24-P5-RL"

          # - runner: "ubuntu-26.04"
          #   runtime: "podman5"
          #   root: "rootless"
          #   label: "U26-P5-RL"

          # - runner: "ubuntu-22.04"
          #   runtime: "docker"
          #   label: "U22-D-RL"

          - runner: "ubuntu-24.04"
            runtime: "docker"
            label: "U24-D-RL"

          # - runner: "ubuntu-26.04"
          #   runtime: "docker"
          #   label: "U26-D-RL"

          # - runner: "macos-13"
          #   runtime: "docker"
          #   label: "M13-D-RL"

          # - runner: "macos-13"
          #   runtime: "podman5"
          #   root: "rootless"
          #   label: "M13-P5-RL"

          # - runner: "macos-13"
          #   runtime: "podman5"
          #   root: "rootful"
          #   label: "M13-P5-RF"

    runs-on: ["${{ matrix.combos.runner }}"]

    steps:
      # Install and configure podman for mac
      - name: Podman5 Mac
        if: startsWith(matrix.combos.runner, 'macos') && matrix.combos.runtime == 'podman5'
        run: |
          echo "Installing Podman for Mac"
          cd /tmp
          wget -nv "https://github.com/containers/podman/releases/download/v5.3.1/podman-installer-macos-universal.pkg"
          sudo installer -pkg /tmp/podman-installer-macos-universal.pkg -target /
          export PATH=$PATH:/opt/podman/bin
          # Add Podman to path for future steps.
          echo "/opt/podman/bin" >> $GITHUB_PATH
          # launch podman
          podman machine init
          podman machine start
          # reconfigure timeouts inside podman vm to be compatible with java docker api
          echo 'mkdir -p /etc/containers/containers.conf.d && printf "[engine]\nservice_timeout=91\n" > /etc/containers/containers.conf.d/service-timeout.conf && systemctl restart podman.socket' |  podman machine ssh --username root --

      - name: Docker Mac
        if: startsWith(matrix.combos.runner, 'macos') && matrix.combos.runtime == 'docker'
        uses: douglascamata/setup-docker-macos-action@v1

      - name: Podman MacRootful (podman machine)
        if: startsWith(matrix.combos.runner, 'macos') && matrix.combos.runtime == 'podman5' && matrix.combos.root == 'rootful'
        run: |
          podman system connection ls
          podman machine stop
          podman machine set --rootful=true
          podman machine start
          podman system connection ls

      - name: Install Podman (Ubuntu)
        if: startsWith(matrix.combos.runner, 'ubuntu') && matrix.combos.runtime == 'podman5'
        uses: redhat-actions/podman-install@main

      - name: Configure Podman Timeouts (Ubuntu)
        if: startsWith(matrix.combos.runner, 'ubuntu') && matrix.combos.runtime == 'podman5'
        run: |
          echo "Configuring timeouts for podman to be compatible with java docker api"
          sudo mkdir -p /etc/containers/containers.conf.d
          printf "[engine]\nservice_timeout=91\n" | sudo tee -a /etc/containers/containers.conf.d/service-timeout.conf

      - name: Podman Ubuntu Rootful (native)
        if: startsWith(matrix.combos.runner, 'ubuntu') && matrix.combos.runtime == 'podman5' && matrix.combos.root == 'rootful'
        run: |
          podman system connection ls
          systemctl disable --now --user podman.socket
          sudo systemctl enable --now podman.socket
          echo "as a user"
          podman info --format '{{.Host.RemoteSocket.Path}}'
          echo "as root"
          sudo podman info --format '{{.Host.RemoteSocket.Path}}'
          export DOCKER_HOST=unix:///run/podman/podman.sock
          echo "DOCKER_HOST=unix:///run/podman/podman.sock" >> $GITHUB_ENV
          sudo ls -al /run/podman | grep podman.sock
          sudo chmod 777 -R /run/podman
          sudo ls -al /run/podman | grep podman.sock

      - name: Docker Ubuntu
        if: startsWith(matrix.combos.runner, 'ubuntu') && matrix.combos.runtime == 'docker'
        run: |
          echo "Configuring Docker for ubuntu" 
          # Remove the podman, to allow library autodetect to find docker
          sudo apt-get remove podman

      - name: Podman info
        if: matrix.combos.runtime == 'podman5'
        run: |
          echo "Podman information"
          podman info

      - name: Docker info
        if: matrix.combos.runtime == 'docker'
        run: |
          echo "Docker information"
          docker info

      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
      - run: npm install
      - run: npm run build
      
      - name: Log in to GHCR (docker)
        if: matrix.combos.runtime == 'docker'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (podman)
        if: matrix.combos.runtime == 'podman5'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Download builder image
        run: |
          if [ "${{ matrix.combos.runtime }}" = "docker" ]; then
            RUNTIME=docker
          else
            RUNTIME=podman
          fi

          echo "Attempting to pull from GHCR..."
          if $RUNTIME pull "${{ env.GHCR_BUILDER_IMAGE }}"; then
            echo "Successfully pulled from GHCR. Tagging image..."
            $RUNTIME tag "${{ env.GHCR_BUILDER_IMAGE }}" "${{ env.SOURCE_BUILDER_IMAGE }}"
          else
            echo "Image not found in GHCR (manifest unknown). Falling back to source image..."
            $RUNTIME pull "${{ env.SOURCE_BUILDER_IMAGE }}"
          fi
          
      - name: Run integration tests
        run: |
          if [ "${{ matrix.combos.runtime }}" = "docker" ]; then
            npm run integration:test:docker
          else
            npm run integration:test:podman
          fi

  integration-tests-status:
    name: All integration tests passed
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: always()
    steps:
      - name: Check matrix job status
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more jobs failed or were cancelled."
          echo "integration-tests: ${{ needs.integration-tests.result }}"
          exit 1
      - name: Success
        run: echo "All matrix jobs passed!"